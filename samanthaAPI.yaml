      tags:
      - portfolio
      summary: List portfolio items
      operationId: v2_listPortfolioItems
      security:
      - bearerAuth: []
      parameters:
      - name: skip
        in: query
        schema:
          type: integer
          default: 0
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
      - name: sort
        in: query
        schema:
          type: string
      - name: dir
        in: query
        schema:
          type: string
          enum:
          - asc
          - desc
      - name: scope
        in: query
        description: Topology scope clamp (UUID) — see /work-items for details.
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Portfolio items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Scope read denied.
        '404':
          description: Scope node not found in this tenant.
    post:
      tags:
      - uncategorised
      summary: POST /portfolio-items
      operationId: postPortfolioItems
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK (stub response shape)
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-stub: true
      description: |-
        AUTO-GENERATED STUB — schema not yet curated.
        Path exists in main.go; request body, response shape, and error
        cases need hand-curation. Search for `x-stub: true` to find all
        stubs awaiting review. See dev/scripts/sync_specs.py.
