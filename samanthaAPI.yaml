  /rank/move:
    post:
      tags:
      - ranking
      summary: Move item in ranking
      operationId: v2_moveRank
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resource_type:
                  type: string
                  description: e.g. "work_item"
                row_id:
                  type: string
                  format: uuid
                before:
                  type: string
                  format: uuid
                  description: Place row immediately before this ID
                after:
                  type: string
                  format: uuid
                  description: Place row immediately after this ID
                to_top:
                  type: boolean
                  description: Move row to top of list
                to_bottom:
                  type: boolean
                  description: Move row to bottom of list
              required:
              - resource_type
              - row_id
      responses:
        '200':
          description: Rank updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  row_id:
                    type: string
                    format: uuid
                  scope:
                    type: string
                    enum:
                    - backlog
                    - sprint
                  new_position:
                    type: number
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
