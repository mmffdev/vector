  /admin/api-keys:
    get:
      tags:
      - admin
      summary: List API keys
      operationId: listApiKeys
      description: List all non-revoked API keys for the caller's subscription.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List of keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        subscription_id:
                          type: string
                          format: uuid
                        prefix:
                          type: string
                        scopes:
                          type: array
                          items:
                            type: string
                        created_at:
                          type: string
                          format: date-time
                        expires_at:
                          type: string
                          format: date-time
                          nullable: true
                        revoked_at:
                          type: string
                          format: date-time
                          nullable: true
                        last_used_at:
                          type: string
                          format: date-time
                          nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/api-keys/issue:
    post:
      tags:
      - admin
      summary: Issue a new API key (story 00443)
      operationId: issueApiKey
      description: |
        Creates a new API key for programmatic access. Returns the raw key once;
        never returned again. Key format is sam_live_<32-char>.
      security:
      - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                expires_at:
                  type: string
                  format: date-time
                  description: Optional key expiration time
                scopes:
                  type: array
                  items:
                    type: string
                  description: Optional scope list (e.g., ["read:portfolio"])
      responses:
        '201':
          description: Key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      subscription_id:
                        type: string
                        format: uuid
                      prefix:
                        type: string
                        description: First 8 chars of key (e.g., sam_live)
                      raw_key:
                        type: string
                        description: Full key (returned only on creation)
                      created_at:
                        type: string
                        format: date-time
                      expires_at:
                        type: string
                        format: date-time
                        nullable: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/api-keys/revoke:
    post:
      tags:
      - admin
      summary: Revoke an API key
      operationId: revokeApiKey
      description: Soft-delete a key (marks revoked_at).
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - id
              properties:
