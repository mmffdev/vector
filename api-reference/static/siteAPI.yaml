openapi: 3.1.0
info:
  title: Vector Site API (BFF)
  version: 1.0.0
  description: |
    Vector's site-tier BFF surface — auth, navigation, admin, roles,
    topology, cost centres, page help, errors, library releases, custom
    pages, user tab order, addressables, workspaces.

    **Transport split** (B20.5.1):
    - **Site BFF** (this spec) → `http://HOST/_site/*`
    - **Public v2 data plane** → `http://HOST/samantha/v2/*` (see `openapi-v2.yaml`)
    - **Transport infra** → `http://HOST/*` (healthz, env, status/pipeline, ws — no spec yet)

    The legacy `/samantha/v1` mount was retired 2026-05-19; every BFF
    route now lives under `/_site`. All error responses use RFC 9457
    Problem Details. Authentication is Bearer JWT via Authorization
    header (some sensitive operations additionally require DPoP proof).
  contact:
    name: Vector API Support
  license:
    name: Proprietary
servers:
- url: http://localhost:5100/_site
  description: Local development (BFF)
- url: https://api.example.com/_site
  description: Production (BFF)
tags:
- name: auth
  description: Authentication and session management
- name: user
  description: User preferences and profile
- name: navigation
  description: Navigation and page registry
- name: addressables
  description: Page element registration (PLA-0005)
- name: portfolio
  description: Portfolio models, adoption, and custom fields
- name: library
  description: Library releases and content
- name: topology
  description: Federated organizational canvas (PLA-0006)
- name: workspaces
  description: Workspace management (PLA-0006)
- name: work-items
  description: Work items, epics, stories, and templates
- name: ranking
  description: Generic ordering and rank management
- name: realtime
  description: WebSocket realtime events
- name: errors
  description: Error reporting and diagnostics
- name: admin
  description: Administrative operations
- name: roles
  description: Role and permission management
- name: timeboxes
  description: Timebox sprints management
- name: fields
  description: Workspace field schema
paths:
  /addressables/admin/{id}/helpable:
    patch:
      tags:
      - addressables
      summary: Update helpable status
      operationId: adminUpdateHelpable
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Helpable status updated
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
