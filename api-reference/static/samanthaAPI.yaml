                  - created_at
                  - updated_at
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  schemas:
    TopologyNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subscription_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        description:
          type: string
        label_override:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        colour:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        layout_mode:
          type: string
          enum:
          - auto-horizontal
          - auto-vertical
          - auto-radial
          - manual
        manual_x:
          type: number
          nullable: true
        manual_y:
          type: number
          nullable: true
        collapsed_default:
          type: boolean
        sort_order:
          type: integer
        archived_at:
          type: string
          format: date-time
          nullable: true
        archived_descendant_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ArchivedDescendant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        archived_at:
          type: string
          format: date-time
        parent_is_archived:
          type: boolean
    CreateTopologyNodeInput:
      type: object
      required:
      - name
      properties:
        parent_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        label_override:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        colour:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        layout_mode:
          type: string
          enum:
          - auto-horizontal
          - auto-vertical
          - auto-radial
          - manual
        manual_x:
          type: number
          nullable: true
        manual_y:
          type: number
          nullable: true
        collapsed_default:
          type: boolean
        sort_order:
          type: integer
    TopologyCommitStatus:
      type: object
      properties:
        committed_at:
          type: string
          format: date-time
          nullable: true
        committed_by:
          type: string
          format: uuid
          nullable: true
        last_node_update:
          type: string
          format: date-time
          nullable: true
        dirty_since_commit:
          type: boolean
    FlowState:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          type: string
          enum:
          - todo
          - in_progress
          - done
          - cancelled
        sort_order:
          type: integer
        is_initial:
          type: boolean
        colour:
          type: string
          nullable: true
    FlowGroup:
      type: object
      properties:
        flow_id:
          type: string
          format: uuid
        type_id:
          type: string
          format: uuid
        type_name:
          type: string
        type_scope:
          type: string
          enum:
          - work
          - strategy
        states:
          type: array
          items:
            $ref: '#/components/schemas/FlowState'
    Problem:
      type: object
      description: RFC 9457 Problem Details
      properties:
        type:
          type: string
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        violations:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
  responses:
    BadRequest:
      description: Bad Request (400)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Unauthorized (401)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Forbidden (403)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Not Found (404)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: Unprocessable Entity (422)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
