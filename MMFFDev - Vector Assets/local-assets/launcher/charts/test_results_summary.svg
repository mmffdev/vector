<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-labelledby="res-title res-desc" font-family="Inter, system-ui, sans-serif">
  <title id="res-title">Test results — 2026-04-27 unit slice</title>
  <desc id="res-desc">Stacked bar chart of MMFF Vector Launcher test results recorded on 2026-04-27. Unit + bundle slice shows 22 XCTest cases plus 4 bundle/codesign/launch checks plus 2 gatekeeper checks — 28 total, all passing. Integration slice (51 cases) and E2E slice (14 cases) show as pending. The dashed reference line marks the 95% confidence threshold.</desc>
  <rect x="0" y="0" width="720" height="320" fill="#FFFFFF"/>
  <text x="24" y="28" font-size="14" font-weight="600" fill="#1A1A1A">Test results — unit slice complete, integration + e2e pending</text>
  <text x="24" y="48" font-size="12" fill="#666">28 of 92 tests run; 28 passed, 0 failed; 64 pending across integration + e2e tiers</text>

  <!-- chart frame -->
  <line x1="160" y1="80" x2="160" y2="260" stroke="#CCC" stroke-width="1"/>
  <line x1="160" y1="260" x2="700" y2="260" stroke="#CCC" stroke-width="1"/>

  <!-- 95% confidence threshold (dashed) -->
  <line x1="673" y1="80" x2="673" y2="260" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="676" y="76" font-size="10" fill="#666">95%</text>

  <!-- bar 1: unit + bundle (28 of 28 pass) -->
  <text x="24" y="110" font-size="12" fill="#1A1A1A">Unit + bundle (28)</text>
  <rect x="160" y="92" width="540" height="28" fill="var(--success, #2A8E5A)" />
  <text x="172" y="111" font-size="11" fill="#FFFFFF" font-weight="600">28 PASS · 100%</text>

  <!-- bar 2: integration (0 of 51 run) -->
  <text x="24" y="170" font-size="12" fill="#1A1A1A">Integration (51)</text>
  <rect x="160" y="152" width="540" height="28" fill="#EEE" stroke="#CCC"/>
  <text x="172" y="171" font-size="11" fill="#666">PENDING · fixtures next phase</text>

  <!-- bar 3: e2e (0 of 14 run) -->
  <text x="24" y="230" font-size="12" fill="#1A1A1A">End-to-end (14)</text>
  <rect x="160" y="212" width="540" height="28" fill="#EEE" stroke="#CCC"/>
  <text x="172" y="231" font-size="11" fill="#666">PENDING · run after handover</text>

  <!-- legend -->
  <rect x="160" y="278" width="12" height="12" fill="var(--success, #2A8E5A)"/>
  <text x="178" y="288" font-size="11" fill="#1A1A1A">PASS</text>
  <rect x="220" y="278" width="12" height="12" fill="#EEE" stroke="#CCC"/>
  <text x="238" y="288" font-size="11" fill="#1A1A1A">PENDING</text>
  <text x="160" y="308" font-size="10" fill="#666">Dashed line marks 95% confidence threshold from spec.</text>
</svg>
