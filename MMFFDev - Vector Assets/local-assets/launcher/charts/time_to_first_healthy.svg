<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" role="img" aria-labelledby="ttfh-title ttfh-desc" font-family="Inter, system-ui, sans-serif">
  <title id="ttfh-title">Time-to-first-healthy on cold launch — last 20 launches</title>
  <desc id="ttfh-desc">Line chart of time-to-first-healthy in seconds for the most recent 20 cold launches. Median trend line at 4.2 seconds drawn as a dashed reference. Most launches between 3 and 6 seconds; one outlier at 11.4s on launch 14 corresponded with a tunnel reconnect.</desc>
  <rect x="0" y="0" width="720" height="260" fill="#FFFFFF"/>
  <text x="24" y="28" font-size="14" font-weight="600" fill="#1A1A1A">Time-to-first-healthy — last 20 cold launches</text>
  <text x="24" y="46" font-size="11" fill="#5C5C5C">Seconds from launch click to all three components reporting healthy.</text>
  <!-- plot x 60..680 (620), y 70..210 (140). 20 points step ~32.6 -->
  <g stroke="#E5E1DA" stroke-width="1">
    <line x1="60" y1="210" x2="680" y2="210"/>
    <line x1="60" y1="175" x2="680" y2="175"/>
    <line x1="60" y1="140" x2="680" y2="140"/>
    <line x1="60" y1="105" x2="680" y2="105"/>
    <line x1="60" y1="70" x2="680" y2="70"/>
  </g>
  <g font-size="10" fill="#8A8A8A" text-anchor="end">
    <text x="54" y="214">0s</text>
    <text x="54" y="179">3s</text>
    <text x="54" y="144">6s</text>
    <text x="54" y="109">9s</text>
    <text x="54" y="74">12s</text>
  </g>
  <g font-size="10" fill="#8A8A8A" text-anchor="middle">
    <text x="60" y="228">L1</text>
    <text x="223" y="228">L6</text>
    <text x="386" y="228">L11</text>
    <text x="549" y="228">L16</text>
    <text x="680" y="228">L20</text>
  </g>
  <!-- median line at 4.2s → y = 210 - 4.2*(140/12) = 210 - 49 = 161 -->
  <line x1="60" y1="161" x2="680" y2="161" stroke="#2F7D54" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="64" y="158" font-size="10" fill="#2F7D54">median 4.2s</text>
  <!-- 20 points step ~32.63, values seconds: 3.8,4.1,3.9,4.5,5.2,3.7,4.0,4.3,3.6,4.8,5.1,4.0,3.9,11.4,5.6,4.2,3.8,4.0,4.4,4.1 -->
  <!-- y = 210 - v*(140/12) -->
  <polyline fill="none" stroke="#1A1A1A" stroke-width="1.75" stroke-linejoin="round" points="
    60,165.67
    92.6,162.17
    125.3,164.5
    157.9,157.5
    190.5,149.33
    223.2,166.83
    255.8,163.33
    288.4,159.83
    321.1,168
    353.7,154
    386.3,150.5
    418.9,163.33
    451.6,164.5
    484.2,77
    516.8,144.67
    549.5,161
    582.1,165.67
    614.7,163.33
    647.3,158.67
    680,162.17
  "/>
  <!-- outlier marker -->
  <circle cx="484.2" cy="77" r="3" fill="#B23B3B"/>
  <text x="490" y="74" font-size="10" fill="#B23B3B">11.4s — tunnel reconnect</text>
  <g font-size="11">
    <rect x="500" y="46" width="12" height="3" fill="#1A1A1A"/>
    <text x="518" y="50" fill="#5C5C5C">cold launch t</text>
    <line x1="600" y1="48" x2="612" y2="48" stroke="#2F7D54" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="618" y="50" fill="#5C5C5C">median</text>
  </g>
</svg>
