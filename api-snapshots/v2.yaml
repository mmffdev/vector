openapi: 3.1.0
info:
  title: Samantha API
  version: 1.0.0
  description: |
    The Samantha external API surface provides programmatic access to portfolio, work-item, topology, and admin features.

    All responses on error return RFC 9457 Problem Details format.
    Authentication uses Bearer token via Authorization header.
  contact:
    name: Samantha API Support
  license:
    name: Proprietary

servers:
  - url: http://localhost:5100/samantha/v1
    description: Local development
  - url: https://api.example.com/samantha/v1
    description: Production

tags:
  - name: auth
    description: Authentication and session management
  - name: user
    description: User preferences and profile
  - name: navigation
    description: Navigation and page registry
  - name: addressables
    description: Page element registration (PLA-0005)
  - name: portfolio
    description: Portfolio models, adoption, and custom fields
  - name: library
    description: Library releases and content
  - name: topology
    description: Federated organizational canvas (PLA-0006)
  - name: workspaces
    description: Workspace management (PLA-0006)
  - name: work-items
    description: Work items, epics, stories, and templates
  - name: ranking
    description: Generic ordering and rank management
  - name: realtime
    description: WebSocket realtime events
  - name: errors
    description: Error reporting and diagnostics
  - name: admin
    description: Administrative operations
  - name: roles
    description: Role and permission management
  - name: timeboxes
    description: Timebox sprints management
  - name: fields
    description: Workspace field schema

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailOrUsername:
                  type: string
                password:
                  type: string
              required: [emailOrUsername, password]
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token
      operationId: refreshToken
      security: []
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logout successful
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password-reset:
    post:
      tags: [auth]
      summary: Request password reset
      operationId: passwordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
              required: [email]
      responses:
        '204':
          description: Reset email sent
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/password-reset/confirm:
    post:
      tags: [auth]
      summary: Confirm password reset
      operationId: passwordResetConfirm
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                newPassword:
                  type: string
              required: [token, newPassword]
      responses:
        '204':
          description: Password reset successful
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/change-password:
    post:
      tags: [auth]
      summary: Change password
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
              required: [currentPassword, newPassword]
      responses:
        '204':
