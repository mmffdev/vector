<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vector — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--canvas); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .row:last-child { margin-bottom: 0; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    height: 40px; padding: 0 16px;
    font-family: var(--font-sans); font-size: 14px; font-weight: 500;
    border: 1px solid transparent; border-radius: var(--radius-md);
    cursor: pointer; transition: background .15s ease, color .15s ease;
  }
  .btn--primary { background: var(--ink); color: #fff; }
  .btn--primary:hover { background: #000; }
  .btn--secondary { background: var(--surface); color: var(--ink); border-color: var(--border-strong); }
  .btn--secondary:hover { background: var(--surface-sunken); }
  .btn--ghost { background: transparent; color: var(--ink-muted); }
  .btn--ghost:hover { background: var(--surface-sunken); color: var(--ink); }
  .btn--danger { background: var(--danger); color: #fff; }
  .btn--sm { height: 32px; padding: 0 12px; font-size: 13px; }
  .btn--lg { height: 48px; padding: 0 20px; font-size: 14px; }
  .label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; color: var(--ink-subtle); width: 88px; }
</style>
</head>
<body>
  <div class="card">
    <div class="row"><span class="label">Variants</span>
      <button class="btn btn--primary">Save changes</button>
      <button class="btn btn--secondary">Cancel</button>
      <button class="btn btn--ghost">Skip</button>
      <button class="btn btn--danger">Delete</button>
    </div>
    <div class="row"><span class="label">Sizes</span>
      <button class="btn btn--primary btn--sm">Small</button>
      <button class="btn btn--primary">Medium</button>
      <button class="btn btn--primary btn--lg">Large</button>
    </div>
    <div class="row"><span class="label">Disabled</span>
      <button class="btn btn--primary" disabled style="opacity:.5">Save changes</button>
      <button class="btn btn--secondary" disabled style="opacity:.5">Cancel</button>
    </div>
  </div>
</body>
</html>
