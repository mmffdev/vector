<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vector — Table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--canvas); }
  .wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--surface-sunken);
    text-align: left; padding: 10px 16px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-muted);
  }
  tbody td {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    color: var(--ink);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface-sunken); }
  .num { font-variant-numeric: tabular-nums; text-align: right; }
  .id { font-family: var(--font-mono); color: var(--ink-muted); font-size: 12px; }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 9999px; font-size: 11px; font-weight: 500;}
  .dot { width: 5px; height: 5px; border-radius: 50%; }
</style>
</head>
<body>
  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Customer</th><th>Product</th><th>Status</th>
          <th class="num">Qty</th><th class="num">Total</th>
        </tr>
      </thead>
      <tbody>
        <tr><td class="id">#04910</td><td>Ryan Korsgaard</td><td>Ergo Office Chair</td><td><span class="pill" style="background:#E5F0E9;color:#2F7D54"><span class="dot" style="background:#2F7D54"></span>Success</span></td><td class="num">12</td><td class="num">$41,400</td></tr>
        <tr><td class="id">#04911</td><td>Madelyn Lubin</td><td>Sunset Desk 02</td><td><span class="pill" style="background:#E5F0E9;color:#2F7D54"><span class="dot" style="background:#2F7D54"></span>Success</span></td><td class="num">20</td><td class="num">$89,200</td></tr>
        <tr><td class="id">#04912</td><td>Abram Bergson</td><td>Eco Bookshelf</td><td><span class="pill" style="background:#FBEFD4;color:#B7791F"><span class="dot" style="background:#B7791F"></span>Pending</span></td><td class="num">22</td><td class="num">$75,900</td></tr>
        <tr><td class="id">#04913</td><td>Phillip Mango</td><td>Green Leaf Desk</td><td><span class="pill" style="background:#EDEAE4;color:#5C5C5C"><span class="dot" style="background:#5C5C5C"></span>Refunded</span></td><td class="num">24</td><td class="num">$19,500</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
