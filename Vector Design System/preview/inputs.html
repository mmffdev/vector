<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vector — Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--canvas); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-size: var(--text-sm); color: var(--ink); font-weight: 500; }
  .inp {
    height: 40px; padding: 0 12px;
    border: 1px solid var(--border-strong); border-radius: var(--radius-md);
    background: var(--surface); color: var(--ink);
    font-family: var(--font-sans); font-size: 14px;
  }
  .inp::placeholder { color: var(--ink-subtle); }
  .inp:focus { outline: 2px solid var(--ink); outline-offset: 2px; border-color: var(--ink); }
  .inp.focus { outline: 2px solid var(--ink); outline-offset: 2px; border-color: var(--ink); }
  .inp.err { border-color: var(--danger); }
  .hint { font-size: 12px; color: var(--ink-muted); }
  .hint--err { color: var(--danger); }
</style>
</head>
<body>
  <div class="card">
    <label class="field"><span class="lbl">Email</span><input class="inp" placeholder="you@company.com"><span class="hint">We'll never share this.</span></label>
    <label class="field"><span class="lbl">Workspace</span><input class="inp focus" value="acme-co"><span class="hint">Focused state — 2px ink outline.</span></label>
    <label class="field"><span class="lbl">Password</span><input class="inp err" type="password" value="········"><span class="hint hint--err">Must be at least 12 characters.</span></label>
    <label class="field"><span class="lbl">Disabled</span><input class="inp" value="readonly@acme.co" disabled style="opacity:.55"><span class="hint">Disabled — opacity 0.55, no interaction.</span></label>
  </div>
</body>
</html>
