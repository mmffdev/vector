<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vector — Status palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--canvas); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px;
    border-radius: var(--radius-full);
    font-size: var(--text-xs);
    font-weight: var(--weight-medium);
    width: fit-content;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .label { font-size: var(--text-sm); color: var(--ink); font-weight: var(--weight-semibold); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell">
      <span class="pill" style="background:#E5F0E9;color:#2F7D54"><span class="dot" style="background:#2F7D54"></span>Success</span>
      <div class="label">Success</div>
      <div class="hex">#2F7D54 / #E5F0E9</div>
    </div>
    <div class="cell">
      <span class="pill" style="background:#FBEFD4;color:#B7791F"><span class="dot" style="background:#B7791F"></span>Warning</span>
      <div class="label">Warning</div>
      <div class="hex">#B7791F / #FBEFD4</div>
    </div>
    <div class="cell">
      <span class="pill" style="background:#F5E1DE;color:#B23B3B"><span class="dot" style="background:#B23B3B"></span>Danger</span>
      <div class="label">Danger</div>
      <div class="hex">#B23B3B / #F5E1DE</div>
    </div>
    <div class="cell">
      <span class="pill" style="background:#E1ECF5;color:#2F5F8A"><span class="dot" style="background:#2F5F8A"></span>Info</span>
      <div class="label">Info</div>
      <div class="hex">#2F5F8A / #E1ECF5</div>
    </div>
  </div>
</body>
</html>
