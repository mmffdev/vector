<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vector — Sidebar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: var(--canvas); display: flex; gap: 16px; align-items: stretch; }
  .sb { width: 240px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 0; display: flex; flex-direction: column; gap: 4px; }
  .tenant { padding: 8px 16px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .logo { width: 32px; height: 32px; background: var(--ink); color: #fff; border-radius: 6px; display: grid; place-items: center; font-weight: 700; font-size: 13px; }
  .tname { display:flex; flex-direction: column; }
  .tname small { font-size: 11px; color: var(--ink-subtle); letter-spacing: 0.04em; }
  .tname strong { font-size: 14px; color: var(--ink); font-weight: 600; }
  .section { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-subtle); font-weight: 500; padding: 14px 16px 6px; }
  .item { display: flex; align-items: center; gap: 10px; height: 36px; padding: 0 16px; color: var(--ink-muted); font-size: 13px; cursor: pointer; }
  .item.active { background: var(--surface-sunken); color: var(--ink); font-weight: 500; }
  .item:hover:not(.active) { background: var(--surface-sunken); color: var(--ink); }
  .ico { width: 16px; height: 16px; }
  .user { margin-top: auto; padding: 12px 16px 0; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
  .av { width: 32px; height: 32px; border-radius: 50%; background: #C8B393; }
  .uname strong { font-size: 13px; color: var(--ink); font-weight: 500; display: block; }
  .uname small { font-size: 11px; color: var(--ink-subtle); }
</style>
</head>
<body>
  <div class="sb">
    <div class="tenant">
      <div class="logo">A</div>
      <div class="tname"><small>WORKSPACE</small><strong>Acme Co.</strong></div>
    </div>
    <div class="section">Main</div>
    <div class="item active"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Dashboard</div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>Backlog</div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>Portfolio</div>
    <div class="section">Settings</div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3"/><path d="M5 21a7 7 0 0114 0"/></svg>Roles</div>
    <div class="user"><div class="av"></div><div class="uname"><strong>Salung Prastyo</strong><small>Sales operator</small></div></div>
  </div>
  <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;display:flex;flex-direction:column;gap:8px">
    <div style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-subtle);font-weight:500">SIDEBAR ANATOMY</div>
    <p style="margin:0;font-size:14px;color:var(--ink);line-height:22px">Tenant block at top. Section eyebrows. Item rows 36px. <strong>Active = sunken tint, no coloured bar.</strong> User block at bottom.</p>
  </div>
</body>
</html>
